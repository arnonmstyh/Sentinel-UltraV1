<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Companion</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-content">
                <div class="avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="header-info">
                    <h2>AI Companion</h2>
                    <span class="status" id="connectionStatus">Online</span>
                    <div style="font-size: 10px; opacity: 0.7; margin-top: 2px;">
                        Session: <span id="sessionIdDisplay">Loading...</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" id="testWebhook" title="Test Webhook">
                    <i class="fas fa-flask"></i>
                </button>
                <button class="action-btn" id="clearChat" title="Clear Chat">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="action-btn" id="settingsBtn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <div class="welcome-content">
                    <i class="fas fa-sparkles"></i>
                    <h3>Welcome to AI Chat!</h3>
                    <p>Start a conversation with your AI companion. I'm here to help and chat with you!</p>
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span class="typing-text">AI is typing...</span>
        </div>

        <!-- Input Area -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <button class="attach-btn" id="attachBtn" title="Attach File">
                    <i class="fas fa-paperclip"></i>
                </button>
                <div class="input-area">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your message here..."
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <div class="input-footer">
                        <span class="char-count" id="charCount">0/2000</span>
                        <button class="test-btn" id="quickTestBtn" title="Quick Test" style="background: none; border: none; color: #667eea; cursor: pointer; font-size: 12px; margin-left: 10px;">Test</button>
                    </div>
                </div>
                <button class="send-btn" id="sendBtn" title="Send Message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-btn" id="closeSettings">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="apiUrl">Webhook URL:</label>
                    <input type="url" id="apiUrl" value="https://csaiteam.app.n8n.cloud/webhook/df8223bf-119c-44d5-9bbf-f74ae26828e8/chat" placeholder="Enter webhook URL">
                </div>
                <div class="setting-group">
                    <label for="theme">Theme:</label>
                    <select id="theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="auto">Auto</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="fontSize">Font Size:</label>
                    <select id="fontSize">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="debugMode">Debug Mode:</label>
                    <input type="checkbox" id="debugMode" style="width: auto; margin-right: 10px;">
                    <span style="font-size: 14px; color: #64748b;">Show detailed error information</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelSettings">Cancel</button>
                <button class="btn btn-primary" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="toast" id="errorToast">
        <div class="toast-content">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage">An error occurred</span>
        </div>
        <button class="toast-close" id="closeToast">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
